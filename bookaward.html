<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>本屋大賞 歴代受賞作</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #F7F0E3;
      font-family: 'Segoe UI', sans-serif;
      color: #2A1810;
      min-height: 100vh;
    }

    /* ===== HEADER ===== */
    header {
      background: linear-gradient(170deg, #1E120A 0%, #2A1810 40%, #3A2218 100%);
      text-align: center;
      padding: 5.5rem 1.5rem 4rem;
      position: relative;
      overflow: hidden;
    }
    header::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% 40%, rgba(200,151,63,0.1) 0%, transparent 65%);
      pointer-events: none;
    }
    header .eyebrow {
      font-size: 0.82rem;
      letter-spacing: 0.45em;
      color: #C8973F;
      text-transform: uppercase;
      margin-bottom: 1.4rem;
      position: relative;
    }
    header h1 {
      font-family: 'Georgia', serif;
      font-size: 4.2rem;
      color: #F7F0E3;
      letter-spacing: 0.08em;
      margin-bottom: 0.4rem;
      position: relative;
      text-shadow: 0 2px 20px rgba(200,151,63,0.15);
    }
    header .subtitle {
      font-size: 1rem;
      color: #A07850;
      letter-spacing: 0.2em;
      position: relative;
    }
    .header-divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #C8973F, transparent);
      margin: 1.5rem auto 0;
      position: relative;
    }
    .header-ornament {
      font-size: 0.75rem; color: #C8973F; letter-spacing: 0.5em; margin-bottom: 0.6rem;
      position: relative; opacity: 0.5;
    }

    /* ===== MAIN ===== */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 3rem 1.5rem 4rem;
    }

    /* ===== ERA SECTION ===== */
    .era-section { margin-bottom: 3rem; }
    .era-heading {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.25rem;
    }
    .era-heading span {
      font-family: 'Georgia', serif;
      font-size: 1rem;
      color: #8B5A2B;
      letter-spacing: 0.12em;
      white-space: nowrap;
    }
    .era-heading::before,
    .era-heading::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #DFD0BA;
    }

    /* ===== GRID ===== */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 1.25rem;
    }

    /* ===== CARD ===== */
    .card {
      background: #FFFFFF;
      border-radius: 0.6rem;
      padding: 1.4rem 1.4rem 1.4rem 1.75rem;
      box-shadow: 0 2px 10px rgba(42, 24, 16, 0.07);
      border: 1px solid #EAE0D0;
      position: relative;
      transition: transform 0.2s, box-shadow 0.2s;
      overflow: hidden;
      cursor: pointer;
    }
    .card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      background: #C8973F;
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 28px rgba(42, 24, 16, 0.13);
    }
    .card .year-badge {
      display: inline-block;
      background: #C8973F;
      color: #FFF;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      padding: 0.2rem 0.7rem;
      border-radius: 2rem;
      margin-bottom: 0.7rem;
    }
    .card .award-num {
      font-size: 0.68rem;
      color: #B09070;
      letter-spacing: 0.05em;
      margin-bottom: 0.55rem;
    }
    .card .title {
      font-family: 'Georgia', serif;
      font-size: 1.05rem;
      font-weight: 700;
      color: #2A1810;
      line-height: 1.55;
      margin-bottom: 0.6rem;
    }
    .card .author {
      font-size: 0.82rem;
      color: #7A5030;
    }
    .card .author::before {
      content: "著 / ";
      color: #C8973F;
      font-size: 0.72rem;
    }
    .card .hint {
      font-size: 0.68rem;
      color: #C8973F;
      margin-top: 0.75rem;
      letter-spacing: 0.05em;
      opacity: 0.8;
    }
    .card-cover {
      text-align: center;
      margin-bottom: 1rem;
    }
    .card-cover img {
      width: 80px;
      height: auto;
      border-radius: 0.15rem;
      box-shadow: 0 3px 10px rgba(0,0,0,0.15);
    }

    /* ===== MODAL ===== */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(30, 15, 5, 0.72);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .modal-overlay.open { display: flex; }

    .modal-box {
      background: #FAF5EC;
      border-radius: 1rem;
      width: 100%;
      max-width: 680px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 24px 60px rgba(20, 8, 2, 0.5);
      position: relative;
    }

    .modal-header {
      background: #2A1810;
      padding: 1.5rem 2rem;
      border-radius: 1rem 1rem 0 0;
      display: flex;
      align-items: baseline;
      gap: 1rem;
    }
    .modal-year {
      font-family: 'Georgia', serif;
      font-size: 2rem;
      color: #F7F0E3;
      letter-spacing: 0.05em;
    }
    .modal-round {
      font-size: 0.8rem;
      color: #C8973F;
      letter-spacing: 0.1em;
    }
    .modal-close {
      position: absolute;
      top: 1rem;
      right: 1.25rem;
      background: none;
      border: none;
      color: #A07850;
      font-size: 1.5rem;
      cursor: pointer;
      line-height: 1;
      transition: color 0.15s;
    }
    .modal-close:hover { color: #F7F0E3; }

    .modal-body { padding: 1.5rem 2rem 2rem; }

    /* ===== BOOK LIST ===== */
    .book-list {
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
    }

    .book-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      background: #FFF;
      border-radius: 0.5rem;
      padding: 0.75rem 1rem;
      box-shadow: 0 1px 6px rgba(42, 24, 16, 0.06);
      border: 1px solid #EAE0D0;
      position: relative;
      cursor: pointer;
      transition: transform 0.12s, box-shadow 0.12s;
    }
    .book-item:hover { transform: translateX(4px); box-shadow: 0 3px 12px rgba(42,24,16,0.1); }
    .book-item.winner {
      border-color: #C8973F;
      background: #FFFBF3;
    }

    .book-rank {
      font-size: 0.7rem;
      font-weight: 700;
      color: #B09070;
      min-width: 2rem;
      text-align: center;
      font-family: 'Segoe UI', sans-serif;
    }
    .book-item.winner .book-rank {
      color: #C8973F;
    }

    /* Cover */
    .cover-wrap {
      width: 52px;
      min-width: 52px;
      height: 74px;
      border-radius: 3px;
      overflow: hidden;
      background: #EAE0D0;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .cover-wrap.loading::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, #EAE0D0 25%, #F7F0E3 50%, #EAE0D0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .cover-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }
    .cover-wrap img.loaded { display: block; }
    .cover-placeholder {
      font-size: 1.4rem;
      opacity: 0.4;
    }
    .cover-wrap.has-cover .cover-placeholder { display: none; }

    /* Book info */
    .book-info { flex: 1; min-width: 0; }
    .book-title {
      font-family: 'Georgia', serif;
      font-size: 0.92rem;
      font-weight: 700;
      color: #2A1810;
      line-height: 1.4;
      margin-bottom: 0.25rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .book-author {
      font-size: 0.75rem;
      color: #8B6040;
    }

    .winner-badge {
      font-size: 0.62rem;
      font-weight: 700;
      background: #C8973F;
      color: #FFF;
      padding: 0.15rem 0.5rem;
      border-radius: 2rem;
      letter-spacing: 0.06em;
      white-space: nowrap;
    }

    /* ===== BOOK DETAIL ===== */
    .book-detail { text-align: center; animation: fadeIn 0.2s; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .book-detail-cover { width: 150px; border-radius: 0.3rem; box-shadow: 0 4px 16px rgba(0,0,0,0.15); margin-bottom: 1rem; }
    .book-detail-title { font-family: Georgia, serif; font-size: 1.2rem; font-weight: 700; color: #2A1810; margin-bottom: 0.2rem; }
    .book-detail-author { font-size: 0.82rem; color: #8B6040; margin-bottom: 1rem; }
    .book-detail-synopsis { text-align: left; font-size: 0.85rem; line-height: 1.85; color: #3A2A1A; background: #fff; padding: 1rem 1.2rem; border-radius: 0.4rem; border: 1px solid #EAE0D0; margin-bottom: 1rem; }
    .book-detail-back { display: inline-block; font-size: 0.8rem; color: #C8973F; cursor: pointer; background: none; border: none; margin-bottom: 1rem; letter-spacing: 0.05em; }
    .book-detail-back:hover { color: #8B5A2B; text-decoration: underline; }
    .book-detail-links { display: flex; gap: 0.5rem; justify-content: center; }

    /* ===== FOOTER ===== */
    footer {
      text-align: center;
      padding: 1.75rem;
      border-top: 1px solid #DFD0BA;
      font-size: 0.85rem;
    }
    footer a {
      color: #8B5A2B;
      text-decoration: none;
      letter-spacing: 0.05em;
    }
    footer a:hover { text-decoration: underline; }

    /* ===== JUMP NAV ===== */
    .jump-nav {
      background: #EDE4D3;
      border-bottom: 1px solid #DFD0BA;
      padding: 0.55rem 1.5rem;
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      flex-wrap: wrap;
      position: sticky;
      top: 0;
      z-index: 90;
    }
    .jump-btn {
      display: inline-block;
      color: #8B5A2B;
      text-decoration: none;
      font-family: 'Georgia', serif;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      padding: 0.3rem 1.1rem;
      border: 1px solid #C8973F;
      border-radius: 0.25rem;
      transition: background 0.15s, color 0.15s;
    }
    .jump-btn:hover { background: #C8973F; color: #fff; }

    /* ===== AMAZON LINK ===== */
    .amazon-link {
      display: inline-block;
      margin-top: 0.5rem;
      font-size: 0.7rem;
      color: #C8973F;
      text-decoration: none;
      border: 1px solid #C8973F;
      border-radius: 0.2rem;
      padding: 0.15rem 0.6rem;
      letter-spacing: 0.04em;
      transition: background 0.15s, color 0.15s;
    }
    .amazon-link:hover { background: #C8973F; color: #fff; }
    .book-amazon {
      display: inline-block;
      margin-top: 0.3rem;
      font-size: 0.72rem;
      color: #C8973F;
      text-decoration: none;
      border: 1px solid #C8973F;
      border-radius: 0.2rem;
      padding: 0.1rem 0.5rem;
      transition: background 0.15s, color 0.15s;
    }
    .book-amazon:hover { background: #C8973F; color: #fff; }

    /* ===== SHINDAN ===== */
    .shindan-btn {
      display: block; margin: 0 auto 2rem; padding: 0.7rem 2rem;
      background: #C8973F; color: #fff; border: none; border-radius: 2rem;
      font-size: 0.95rem; font-weight: 700; letter-spacing: 0.08em; cursor: pointer;
      box-shadow: 0 3px 12px rgba(200,151,63,0.3); transition: transform 0.15s, box-shadow 0.15s;
    }
    .shindan-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(200,151,63,0.4); }
    .shindan-overlay {
      display: none; position: fixed; inset: 0; background: rgba(30,15,5,0.8);
      z-index: 1100; align-items: center; justify-content: center; padding: 1rem;
    }
    .shindan-overlay.open { display: flex; }
    .shindan-box {
      background: #FAF5EC; border-radius: 1rem; width: 100%; max-width: 500px;
      padding: 2.5rem 2rem; text-align: center; position: relative;
      box-shadow: 0 24px 60px rgba(20,8,2,0.5); animation: fadeIn 0.25s;
    }
    .shindan-close {
      position: absolute; top: 0.8rem; right: 1rem; background: none; border: none;
      color: #A07850; font-size: 1.3rem; cursor: pointer;
    }
    .shindan-step { font-size: 0.72rem; color: #C8973F; letter-spacing: 0.15em; margin-bottom: 0.5rem; }
    .shindan-q { font-family: Georgia, serif; font-size: 1.15rem; color: #2A1810; margin-bottom: 1.5rem; line-height: 1.6; }
    .shindan-options { display: flex; flex-direction: column; gap: 0.7rem; }
    .shindan-opt {
      padding: 0.85rem 1.2rem; background: #fff; border: 2px solid #EAE0D0; border-radius: 0.5rem;
      font-size: 0.9rem; color: #2A1810; cursor: pointer; transition: border-color 0.15s, background 0.15s;
    }
    .shindan-opt:hover { border-color: #C8973F; background: #FFFBF3; }
    .shindan-results-grid { display: flex; flex-direction: column; gap: 0.8rem; margin-bottom: 1rem; text-align: left; }
    .shindan-card {
      display: flex; gap: 0.8rem; background: #fff; border-radius: 0.5rem; padding: 0.7rem;
      border: 1px solid #EAE0D0; box-shadow: 0 1px 6px rgba(42,24,16,0.06);
      cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s;
    }
    .shindan-card:hover { border-color: #C8973F; box-shadow: 0 3px 12px rgba(42,24,16,0.1); }
    .shindan-card img { width: 60px; height: 85px; object-fit: cover; border-radius: 0.2rem; flex-shrink: 0; }
    .shindan-card-info { flex: 1; min-width: 0; }
    .shindan-card-title { font-family: Georgia, serif; font-size: 0.92rem; font-weight: 700; color: #2A1810; margin-bottom: 0.15rem; }
    .shindan-card-author { font-size: 0.72rem; color: #8B6040; margin-bottom: 0.2rem; }
    .shindan-card-badge { display: inline-block; font-size: 0.62rem; background: #C8973F; color: #fff; padding: 0.1rem 0.45rem; border-radius: 1rem; margin-bottom: 0.25rem; }
    .shindan-card-comment { font-size: 0.78rem; color: #5A4030; line-height: 1.5; }
    .shindan-card-link { font-size: 0.68rem; color: #C8973F; text-decoration: none; margin-top: 0.2rem; display: inline-block; }
    .shindan-card-link:hover { text-decoration: underline; }
    .shindan-btns { display: flex; gap: 0.5rem; justify-content: center; flex-wrap: wrap; margin-top: 0.5rem; }
    .shindan-again { padding: 0.5rem 1.5rem; background: none; border: 2px solid #C8973F; color: #C8973F; border-radius: 2rem; font-size: 0.82rem; cursor: pointer; transition: background 0.15s, color 0.15s; }
    .shindan-again:hover { background: #C8973F; color: #fff; }
    .shindan-shuffle { padding: 0.5rem 1.5rem; background: #C8973F; border: 2px solid #C8973F; color: #fff; border-radius: 2rem; font-size: 0.82rem; cursor: pointer; transition: opacity 0.15s; }
    .shindan-shuffle:hover { opacity: 0.85; }

    /* ===== SEARCH ===== */
    .search-wrap {
      max-width: 480px; margin: 0 auto 2rem; padding: 0 1.5rem; position: relative;
    }
    .search-input {
      width: 100%; padding: 0.7rem 1rem 0.7rem 2.6rem;
      background: #FFFFFF; border: 1px solid #DFD0BA; border-radius: 2rem;
      font-size: 0.88rem; color: #2A1810; outline: none;
      font-family: 'Segoe UI', sans-serif;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-input::placeholder { color: #B8A898; }
    .search-input:focus { border-color: #C8973F; box-shadow: 0 0 0 3px rgba(200,151,63,0.12); }
    .search-icon {
      position: absolute; left: calc(1.5rem + 0.9rem); top: 50%; transform: translateY(-50%);
      font-size: 0.9rem; color: #B8A898; pointer-events: none;
    }
    .search-results {
      position: absolute; left: 1.5rem; right: 1.5rem; top: calc(100% + 0.3rem);
      background: #FFF; border: 1px solid #DFD0BA; border-radius: 0.6rem;
      box-shadow: 0 8px 24px rgba(42,24,16,0.12); max-height: 360px; overflow-y: auto;
      z-index: 50; display: none;
    }
    .search-results.open { display: block; }
    .search-item {
      display: flex; align-items: center; gap: 0.7rem; padding: 0.6rem 0.8rem;
      cursor: pointer; border-bottom: 1px solid #F0E8DC; transition: background 0.1s;
    }
    .search-item:last-child { border-bottom: none; }
    .search-item:hover { background: #FBF6EE; }
    .search-item img { width: 36px; height: 50px; object-fit: cover; border-radius: 0.15rem; flex-shrink: 0; }
    .search-item-info { flex: 1; min-width: 0; }
    .search-item-title { font-size: 0.85rem; font-weight: 600; color: #2A1810; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .search-item-meta { font-size: 0.7rem; color: #8B6040; margin-top: 0.1rem; }
    .search-item-badge { font-size: 0.58rem; background: #C8973F; color: #fff; padding: 0.08rem 0.4rem; border-radius: 1rem; flex-shrink: 0; }
    .search-empty { padding: 1.2rem; text-align: center; font-size: 0.82rem; color: #A09080; }
    .search-count { font-size: 0.7rem; color: #B8A898; padding: 0.4rem 0.8rem; border-bottom: 1px solid #F0E8DC; }

    /* ===== AUTHOR VIEW ===== */
    .author-overlay {
      display: none; position: fixed; inset: 0; background: rgba(30,15,5,0.72);
      z-index: 1000; align-items: flex-start; justify-content: center; padding: 2rem 1rem;
      overflow-y: auto;
    }
    .author-overlay.open { display: flex; }
    .author-box {
      background: #FAF5EC; border-radius: 1rem; width: 100%; max-width: 760px;
      padding: 2rem; position: relative;
      box-shadow: 0 24px 60px rgba(20,8,2,0.5); animation: fadeIn 0.25s;
    }
    .author-close {
      position: absolute; top: 1rem; right: 1.25rem; background: none; border: none;
      color: #A07850; font-size: 1.5rem; cursor: pointer;
    }
    .author-close:hover { color: #2A1810; }
    .author-heading {
      text-align: center; margin-bottom: 1.5rem;
    }
    .author-heading h2 {
      font-family: Georgia, serif; font-size: 1.4rem; color: #2A1810; margin-bottom: 0.3rem;
    }
    .author-heading p { font-size: 0.78rem; color: #A07850; letter-spacing: 0.1em; }

    .author-list { display: flex; flex-direction: column; gap: 0.6rem; }
    .author-group {
      background: #fff; border-radius: 0.6rem; border: 1px solid #EAE0D0; overflow: hidden;
    }
    .author-group-header {
      display: flex; align-items: center; gap: 0.8rem;
      padding: 0.8rem 1rem; background: #FFFBF3; cursor: pointer;
      border-bottom: 1px solid #EAE0D0; transition: background 0.15s;
    }
    .author-group-header:hover { background: #FFF5E5; }
    .author-rank {
      font-family: Georgia, serif; font-size: 1.1rem; font-weight: 400;
      color: #B09070; min-width: 1.8rem; text-align: center;
    }
    .author-rank.top3 { color: #C8973F; font-size: 1.25rem; }
    .author-main { flex: 1; min-width: 0; }
    .author-name { font-weight: 700; font-size: 0.95rem; color: #2A1810; }
    .author-taisho { font-size: 0.65rem; color: #C8973F; margin-top: 0.1rem; }
    .author-bar-wrap { flex: 1; max-width: 160px; display: flex; align-items: center; gap: 0.5rem; }
    .author-bar { height: 6px; border-radius: 3px; background: linear-gradient(90deg, #C8973F, #E8C878); }
    .author-count {
      font-size: 0.72rem; color: #8B6040; font-weight: 700; white-space: nowrap;
    }
    .author-arrow { color: #D0C4B4; font-size: 0.65rem; flex-shrink: 0; transition: transform 0.2s; }
    .author-arrow.open { transform: rotate(90deg); }
    .author-books { padding: 0; }
    .author-books.collapsed { display: none; }
    .author-book {
      display: flex; align-items: center; gap: 0.7rem; padding: 0.55rem 1rem 0.55rem 3.6rem;
      border-bottom: 1px solid #F5EDE0; cursor: pointer; transition: background 0.1s;
    }
    .author-book:last-child { border-bottom: none; }
    .author-book:hover { background: #FBF6EE; }
    .author-book img { width: 32px; height: 45px; object-fit: cover; border-radius: 0.15rem; flex-shrink: 0; }
    .author-book-info { flex: 1; min-width: 0; }
    .author-book-title { font-size: 0.82rem; font-weight: 600; color: #2A1810; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .author-book-meta { font-size: 0.68rem; color: #8B6040; }
    .author-book-badge { font-size: 0.58rem; background: #EAE0D0; color: #8B6040; padding: 0.1rem 0.4rem; border-radius: 1rem; flex-shrink: 0; }
    .author-book-badge.winner { background: #C8973F; color: #fff; }

    /* ===== SCROLL TO TOP ===== */
    .scroll-top {
      position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 200;
      width: 44px; height: 44px; border-radius: 50%;
      background: #2A1810; color: #C8973F; border: 1px solid rgba(200,151,63,0.3);
      font-size: 1.1rem; cursor: pointer; display: none; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2); transition: background 0.15s, transform 0.15s;
    }
    .scroll-top.visible { display: flex; }
    .scroll-top:hover { background: #C8973F; color: #fff; transform: translateY(-2px); }

    /* ===== STATS DASHBOARD ===== */
    .stats-overlay {
      display: none; position: fixed; inset: 0; background: rgba(30,15,5,0.72);
      z-index: 1000; align-items: flex-start; justify-content: center; padding: 2rem 1rem;
      overflow-y: auto;
    }
    .stats-overlay.open { display: flex; }
    .stats-box {
      background: #FAF5EC; border-radius: 1rem; width: 100%; max-width: 760px;
      padding: 2rem; position: relative;
      box-shadow: 0 24px 60px rgba(20,8,2,0.5); animation: fadeIn 0.25s;
    }
    .stats-close {
      position: absolute; top: 1rem; right: 1.25rem; background: none; border: none;
      color: #A07850; font-size: 1.5rem; cursor: pointer;
    }
    .stats-close:hover { color: #2A1810; }
    .stats-heading { text-align: center; margin-bottom: 2rem; }
    .stats-heading h2 { font-family: Georgia, serif; font-size: 1.4rem; color: #2A1810; margin-bottom: 0.3rem; }
    .stats-heading p { font-size: 0.78rem; color: #A07850; letter-spacing: 0.1em; }

    .stats-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 0.8rem; margin-bottom: 2rem;
    }
    .stat-card {
      background: #fff; border-radius: 0.5rem; padding: 1rem; text-align: center;
      border: 1px solid #EAE0D0;
    }
    .stat-number { font-family: Georgia, serif; font-size: 2rem; color: #C8973F; font-weight: 700; }
    .stat-label { font-size: 0.72rem; color: #8B6040; margin-top: 0.2rem; letter-spacing: 0.05em; }

    .stats-section { margin-bottom: 1.8rem; }
    .stats-section-title {
      font-size: 0.75rem; color: #C8973F; letter-spacing: 0.2em; text-transform: uppercase;
      margin-bottom: 0.8rem; padding-bottom: 0.4rem; border-bottom: 1px solid #EAE0D0;
    }
    .stats-bar-row { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.5rem; }
    .stats-bar-label { font-size: 0.78rem; color: #2A1810; min-width: 100px; text-align: right; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .stats-bar-track { flex: 1; height: 18px; background: #F0E8DC; border-radius: 9px; overflow: hidden; position: relative; }
    .stats-bar-fill { height: 100%; border-radius: 9px; background: linear-gradient(90deg, #C8973F, #E8C878); transition: width 0.5s; }
    .stats-bar-val { font-size: 0.7rem; color: #8B6040; min-width: 2rem; font-weight: 600; }

    .stats-era-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.6rem; }
    .stats-era-card {
      background: #fff; border-radius: 0.4rem; padding: 0.8rem; text-align: center;
      border: 1px solid #EAE0D0;
    }
    .stats-era-label { font-family: Georgia, serif; font-size: 0.9rem; color: #2A1810; margin-bottom: 0.3rem; }
    .stats-era-val { font-size: 0.72rem; color: #8B6040; line-height: 1.5; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 600px) {
      /* Header */
      header { padding: 3.5rem 1rem 2.5rem; }

      /* Main */

      .modal-body { padding: 1rem 1.2rem 1.5rem; }
      .modal-close { top: 0.7rem; right: 0.9rem; }

      /* Book items in modal */
      .book-item { padding: 0.6rem 0.7rem; gap: 0.7rem; }
      .book-title { font-size: 0.82rem; }
      .cover-wrap { width: 42px; min-width: 42px; height: 60px; }

      /* Book detail */
      .book-detail-cover { width: 120px; }

      /* Era heading */

      /* Author view */
      .author-overlay { padding: 1rem 0.5rem; }
      .author-box { padding: 1.5rem 1rem; }
      .author-heading h2 { font-size: 1.2rem; }

      /* Stats */

      .stats-box { padding: 1.5rem 1rem; }
      .stats-heading h2 { font-size: 1.2rem; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }

      .stats-bar-label { min-width: 70px; font-size: 0.72rem; }
      .scroll-top { bottom: 1rem; right: 1rem; width: 40px; height: 40px; font-size: 1rem; }

    const eraMap = {
      '2020s': [2026, 2025, 2024, 2023, 2022, 2021, 2020],
      '2010s': [2019, 2018, 2017, 2016, 2015, 2014, 2013, 2012, 2011, 2010],
      '2000s': [2009, 2008, 2007, 2006, 2005, 2004],
    };

    function renderCards() {
      Object.entries(eraMap).forEach(([era, years]) => {
        const grid = document.getElementById('grid-' + era);
        if (!grid) return;
        years.forEach(year => {
          const data = awardsData[year];
          if (!data) return;
          const winner = data.nominees.find(n => n.rank === 1);
          const cover = coverImages[year];
          const card = document.createElement('div');
          card.className = 'card';
          card.onclick = () => openModal(year);
          card.innerHTML = `
            ${cover ? `<div class="card-cover"><img src="${cover}" alt="${winner.title}" loading="lazy"></div>` : ''}
            <div class="year-badge">${year}</div>
            <div class="award-num">第 ${data.round} 回</div>
            <div class="title">${winner.title}</div>
            <div class="author">${winner.author}</div>
            <div class="hint">▶ ノミネート一覧</div>
            <a class="amazon-link" href="${amazonUrl(winner.title, winner.author)}" target="_blank" onclick="event.stopPropagation()">Amazon で見る</a>
          `;
          grid.appendChild(card);
        });
      });
    }

    function openModal(year) {
      const data = awardsData[year];
      if (!data) return;

      document.getElementById('modal-year').textContent = year;
      document.getElementById('modal-round').textContent = `第 ${data.round} 回 本屋大賞`;

      const list = document.getElementById('book-list');
      list.innerHTML = '';
      const covers = nomineeCoverImages[year] || [];

      data.nominees.forEach(book => {
        const isWinner = book.rank === 1;
        const coverUrl = covers[book.rank - 1] || '';
        const hasSynopsis = !!bookSynopses[`${year}-${book.rank}`];
        const item = document.createElement('div');
        item.className = 'book-item' + (isWinner ? ' winner' : '');
        item.onclick = () => showBookDetail(year, book.rank);

        item.innerHTML = `
          <div class="book-rank">${book.rank}位</div>
          <div class="cover-wrap${coverUrl ? ' has-cover' : ''}">
            ${coverUrl ? `<img alt="表紙" class="cover-img loaded" src="${coverUrl}" loading="lazy">` : '<div class="cover-placeholder">📖</div>'}
          </div>
          <div class="book-info">
            <div class="book-title">${book.title}</div>
            <div class="book-author">${book.author}</div>
          </div>
          ${isWinner ? '<div class="winner-badge">大賞</div>' : '<div style="color:#C8973F;font-size:0.7rem;flex-shrink:0;">▶</div>'}
        `;
        list.appendChild(item);
      });

      document.getElementById('modal').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function showBookDetail(year, rank) {
      const data = awardsData[year];
      const book = data.nominees.find(n => n.rank === rank);
      if (!book) return;
      const covers = nomineeCoverImages[year] || [];
      const coverUrl = covers[rank - 1] || '';
      const synopsis = bookSynopses[`${year}-${rank}`] || '';

      const list = document.getElementById('book-list');
      list.innerHTML = `
        <div class="book-detail">
          <button class="book-detail-back" onclick="openModal(${year})">← ノミネート一覧に戻る</button>
          ${coverUrl ? `<div><img class="book-detail-cover" src="${coverUrl}" alt="${book.title}"></div>` : ''}
          <div class="book-detail-title">${book.title}</div>
          <div class="book-detail-author">著 / ${book.author}</div>
          ${synopsis
            ? `<div class="book-detail-synopsis">${synopsis}</div>`
            : '<div class="book-detail-synopsis" style="color:#999;font-style:italic;">あらすじは準備中です</div>'}
          <div class="book-detail-links">
            <a class="book-amazon" href="${amazonUrl(book.title, book.author)}" target="_blank">Amazon で見る</a>
          </div>
        </div>
      `;
      list.parentElement.scrollTop = 0;
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('open');
      document.body.style.overflow = '';
    }

    function handleOverlayClick(e) {
      if (e.target === document.getElementById('modal')) closeModal();
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeModal();

        { year: 2018, rank: 3, comment: '夏合宿のクローズドサークルで連続殺人。衝撃の展開。' },
        { year: 2023, rank: 6, comment: '問題が読まれる前に正解。なぜ？知的興奮のミステリー。' },
        { year: 2023, rank: 4, comment: '「爆発がある」と予言する犯人。スリル満点の傑作。' },
        { year: 2007, rank: 2, comment: '京都の夜。黒髪の乙女を巡る珍事件と運命の転回。' },
      ],
      'exciting-adventure-adult-hopeful': [
        { year: 2008, rank: 1, comment: '濡れ衣の逃走劇。伊坂幸太郎の最高傑作と名高い1冊。' },
        { year: 2020, rank: 6, comment: '霊媒師と推理作家の異色コンビが事件を解き明かす。' },
        { year: 2011, rank: 1, comment: '令嬢刑事と毒舌執事。軽快で痛快なミステリ。' },
        { year: 2009, rank: 3, comment: 'スパイ養成学校の精鋭たちが繰り広げる知的な諜報戦。' },
        { year: 2014, rank: 1, comment: '戦国の瀬戸内海。海賊王の娘が戦場を駆ける歴史大作。' },
      ],
      'exciting-adventure-adult-lingering': [
        { year: 2013, rank: 1, comment: '敗戦後の日本で石油会社を守り抜いた男の壮大なドラマ。' },
        { year: 2022, rank: 9, comment: '有岡城の土牢に幽閉された官兵衛が謎を解く戦国ミステリー。' },
        { year: 2013, rank: 2, comment: '娘の失踪と未解決事件。警察組織の闇に迫る重厚な警察小説。' },
        { year: 2020, rank: 5, comment: '樺太のアイヌの人々。生きるための「熱」を追う歴史大作。' },
        { year: 2009, rank: 6, comment: '1000年後の日本。念動力の社会に隠された恐るべき秘密。' },
      ],
    };

    let shindanAnswers = [];

    function startShindan() {
      shindanAnswers = [];
      document.getElementById('shindan').classList.add('open');
      document.body.style.overflow = 'hidden';
      renderShindanQuestion(0);
    }

    function closeShindan() {
      document.getElementById('shindan').classList.remove('open');
      document.body.style.overflow = '';
    }

    function renderShindanQuestion(idx) {
      const q = shindanQuestions[idx];
      const el = document.getElementById('shindan-content');
      el.innerHTML = `
        <div class="shindan-step">QUESTION ${idx + 1} / ${shindanQuestions.length}</div>
        <div class="shindan-q">${q.q}</div>
        <div class="shindan-options">
          ${q.opts.map(o => `<button class="shindan-opt" onclick="answerShindan(${idx},'${o.value}')">${o.label}</button>`).join('')}
        </div>
      `;
    }

    function answerShindan(idx, value) {
      shindanAnswers.push(value);
      if (idx + 1 < shindanQuestions.length) {
        renderShindanQuestion(idx + 1);
      } else {
        showShindanResult();
      }
    }

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
      return a;
    }

    function showShindanResult() {
      const key = shindanAnswers.join('-');
      const pool = shindanResults[key];
      if (!pool) { closeShindan(); return; }
      renderShindanBooks(shuffle(pool).slice(0, 3));
    }

    function reshuffleShindan() {
      const key = shindanAnswers.join('-');
      const pool = shindanResults[key];
      renderShindanBooks(shuffle(pool).slice(0, 3));
    }

    let lastShindanPicks = [];

    function renderShindanBooks(picks) {
      lastShindanPicks = picks;
      const el = document.getElementById('shindan-content');
      const cards = picks.map((r, i) => {
        const data = awardsData[r.year];
        const book = data.nominees.find(n => n.rank === r.rank);
        const covers = nomineeCoverImages[r.year] || [];
        const coverUrl = covers[r.rank - 1] || '';
        const badge = r.rank === 1 ? `${r.year} 大賞` : `${r.year} ${r.rank}位`;
        return `
          <div class="shindan-card" onclick="showShindanDetail(${r.year},${r.rank})">
            ${coverUrl ? `<img src="${coverUrl}" alt="${book.title}" loading="lazy">` : ''}
            <div class="shindan-card-info">
              <div class="shindan-card-badge">${badge}</div>
              <div class="shindan-card-title">${book.title}</div>
              <div class="shindan-card-author">著 / ${book.author}</div>
              <div class="shindan-card-comment">${r.comment}</div>
            </div>
          </div>`;
      }).join('');

      el.innerHTML = `
        <div class="shindan-step">あなたにおすすめの本</div>
        <div class="shindan-q" style="font-size:0.95rem;margin-bottom:1rem;">気になる本をタップして詳細を見る</div>
        <div class="shindan-results-grid">${cards}</div>
        <div class="shindan-btns">
          <button class="shindan-shuffle" onclick="reshuffleShindan()">🔀 別の本を見る</button>
          <button class="shindan-again" onclick="startShindan()">最初からやり直す</button>
        </div>
      `;
    }

    function showShindanDetail(year, rank) {
      const data = awardsData[year];
      const book = data.nominees.find(n => n.rank === rank);
      if (!book) return;
      const covers = nomineeCoverImages[year] || [];
      const coverUrl = covers[rank - 1] || '';
      const synopsis = bookSynopses[`${year}-${rank}`] || '';
      const badge = rank === 1 ? `${year}年 本屋大賞 大賞受賞作` : `${year}年 本屋大賞 ${rank}位`;

      const el = document.getElementById('shindan-content');
      el.innerHTML = `
        <div class="book-detail" style="animation:fadeIn 0.2s;">
          <button class="book-detail-back" onclick="renderShindanBooks(lastShindanPicks)">← 診断結果に戻る</button>
          ${coverUrl ? `<div><img class="book-detail-cover" src="${coverUrl}" alt="${book.title}"></div>` : ''}
          <div class="book-detail-title">${book.title}</div>
          <div class="book-detail-author">著 / ${book.author}</div>
          <div style="font-size:0.7rem;color:#C8973F;margin-bottom:1rem;">${badge}</div>
          ${synopsis
            ? `<div class="book-detail-synopsis">${synopsis}</div>`
            : '<div class="book-detail-synopsis" style="color:#999;font-style:italic;">あらすじは準備中です</div>'}
          <div class="book-detail-links">
            <a class="book-amazon" href="${amazonUrl(book.title, book.author)}" target="_blank">Amazon で見る</a>
          </div>
        </div>
      `;
    }

    /* ===== AUTHOR VIEW ===== */
    function buildAuthorData() {
      const map = {};
      Object.entries(awardsData).forEach(([year, data]) => {
        data.nominees.forEach(book => {
          if (!map[book.author]) map[book.author] = [];
          const covers = nomineeCoverImages[year] || [];
          map[book.author].push({
            year: Number(year), rank: book.rank, title: book.title,
            cover: covers[book.rank - 1] || '',
          });
        });
      });
      return Object.entries(map)
        .map(([author, books]) => ({ author, books, count: books.length }))
        .filter(a => a.count >= 2)
        .sort((a, b) => b.count - a.count || a.author.localeCompare(b.author, 'ja'));
    }

    function openAuthorView() {
      const authors = buildAuthorData();
      const maxCount = authors[0]?.count || 1;
      const listEl = document.getElementById('author-list');

      listEl.innerHTML = authors.map((a, i) => {
        const rankNum = i + 1;
        const wins = a.books.filter(b => b.rank === 1).length;
        const booksHtml = a.books
          .sort((x, y) => y.year - x.year)
          .map(b => {
            const isWinner = b.rank === 1;
            const badge = isWinner ? `${b.year} 大賞` : `${b.year} ${b.rank}位`;
            return `
              <div class="author-book" onclick="authorBookClick(${b.year},${b.rank})">
                ${b.cover ? `<img src="${b.cover}" alt="${b.title}" loading="lazy">` : ''}
                <div class="author-book-info">
                  <div class="author-book-title">${b.title}</div>
                  <div class="author-book-meta">${b.year}年 第${awardsData[b.year].round}回</div>
                </div>
                <span class="author-book-badge${isWinner ? ' winner' : ''}">${badge}</span>
              </div>`;
          }).join('');

        const barWidth = Math.round((a.count / maxCount) * 100);
        const taishoText = wins > 0 ? `大賞 ${wins}回` : '';

        return `
          <div class="author-group">
            <div class="author-group-header" onclick="toggleAuthorBooks(this)">
              <span class="author-rank${rankNum <= 3 ? ' top3' : ''}">${rankNum}</span>
              <div class="author-main">
                <div class="author-name">${a.author}</div>
                ${taishoText ? `<div class="author-taisho">👑 ${taishoText}</div>` : ''}
              </div>
              <div class="author-bar-wrap">
                <div class="author-bar" style="width:${barWidth}%"></div>
                <span class="author-count">${a.count}回</span>
              </div>
              <span class="author-arrow">▶</span>
            </div>
            <div class="author-books collapsed">${booksHtml}</div>
          </div>`;
      }).join('');

      document.getElementById('author-overlay').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeAuthorView() {
      document.getElementById('author-overlay').classList.remove('open');
      document.body.style.overflow = '';
    }

    function toggleAuthorBooks(header) {
      header.nextElementSibling.classList.toggle('collapsed');
      header.querySelector('.author-arrow').classList.toggle('open');
    }

    function authorBookClick(year, rank) {
      closeAuthorView();
      openModal(year);
      setTimeout(() => showBookDetail(year, rank), 50);
    }

    /* ===== SEARCH ===== */
    function buildSearchIndex() {
      const index = [];
      Object.entries(awardsData).forEach(([year, data]) => {
        data.nominees.forEach(book => {
          const covers = nomineeCoverImages[year] || [];
          index.push({
            year: Number(year), rank: book.rank, round: data.round,
            title: book.title, author: book.author,
            cover: covers[book.rank - 1] || '',
          });
        });
      });
      return index;
    }

    let searchIndex = [];

    function handleSearch(e) {
      const q = e.target.value.trim().toLowerCase();
      const resultsEl = document.getElementById('search-results');

      if (!q) {
        resultsEl.classList.remove('open');
        resultsEl.innerHTML = '';
        return;
      }

      const matches = searchIndex.filter(b =>
        b.title.toLowerCase().includes(q) || b.author.toLowerCase().includes(q)
      ).slice(0, 20);

      if (matches.length === 0) {
        resultsEl.innerHTML = '<div class="search-empty">該当する作品が見つかりません</div>';
      } else {
        const countText = `<div class="search-count">${matches.length}件${matches.length === 20 ? '以上' : ''}の結果</div>`;
        resultsEl.innerHTML = countText + matches.map(b => {
          const badge = b.rank === 1 ? `${b.year} 大賞` : `${b.year} ${b.rank}位`;
          return `
            <div class="search-item" onclick="openSearchDetail(${b.year},${b.rank})">
              ${b.cover ? `<img src="${b.cover}" alt="${b.title}" loading="lazy">` : ''}
              <div class="search-item-info">
                <div class="search-item-title">${b.title}</div>
                <div class="search-item-meta">${b.author}</div>
              </div>
              <span class="search-item-badge">${badge}</span>
            </div>`;
        }).join('');
      }
      resultsEl.classList.add('open');
    }

    function openSearchDetail(year, rank) {
      document.getElementById('search-results').classList.remove('open');
      document.getElementById('search-input').value = '';
      openModal(year);
      setTimeout(() => showBookDetail(year, rank), 50);
    }

    document.addEventListener('click', e => {
      const wrap = document.querySelector('.search-wrap');
      if (!wrap.contains(e.target)) {
        document.getElementById('search-results').classList.remove('open');
      }
    });

    /* ===== SCROLL TO TOP ===== */
    window.addEventListener('scroll', () => {
      document.getElementById('scroll-top').classList.toggle('visible', window.scrollY > 600);
    });

    /* ===== STATS DASHBOARD ===== */
    function openStats() {
      renderStats();
      document.getElementById('stats-overlay').classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeStats() {
      document.getElementById('stats-overlay').classList.remove('open');
      document.body.style.overflow = '';
    }

    function renderStats() {
      const el = document.getElementById('stats-content');
      const allBooks = [];
      const authorMap = {};
      const publisherDecade = { '2000s': 0, '2010s': 0, '2020s': 0 };
      let totalNominees = 0;
      let totalWinners = 0;

      Object.entries(awardsData).forEach(([year, data]) => {
        const y = Number(year);
        data.nominees.forEach(book => {
          allBooks.push({ ...book, year: y });
          if (!authorMap[book.author]) authorMap[book.author] = { count: 0, wins: 0 };
          authorMap[book.author].count++;
          if (book.rank === 1) { authorMap[book.author].wins++; totalWinners++; }
          totalNominees++;
        });
        if (y >= 2020) publisherDecade['2020s'] += data.nominees.length;
        else if (y >= 2010) publisherDecade['2010s'] += data.nominees.length;
        else publisherDecade['2000s'] += data.nominees.length;
      });

      const uniqueAuthors = Object.keys(authorMap).length;
      const multiNom = Object.values(authorMap).filter(a => a.count >= 2).length;
      const multiWin = Object.values(authorMap).filter(a => a.wins >= 2).length;

      // Top nominated authors
      const topAuthors = Object.entries(authorMap)
        .sort((a, b) => b[1].count - a[1].count)
        .slice(0, 8);
      const topMax = topAuthors[0]?.[1].count || 1;

      // Top winners
      const topWinners = Object.entries(authorMap)
        .filter(([, v]) => v.wins > 0)
        .sort((a, b) => b[1].wins - a[1].wins || b[1].count - a[1].count)
        .slice(0, 6);

      // Era stats
      const eraData = {
        '2000s': { years: '2004-2009', count: 0, authors: new Set() },
        '2010s': { years: '2010-2019', count: 0, authors: new Set() },
        '2020s': { years: '2020-2026', count: 0, authors: new Set() },
      };
      allBooks.forEach(b => {
        const era = b.year >= 2020 ? '2020s' : b.year >= 2010 ? '2010s' : '2000s';
        eraData[era].count++;
        eraData[era].authors.add(b.author);
      });

      el.innerHTML = `
        <div class="stats-grid">
          <div class="stat-card"><div class="stat-number">23</div><div class="stat-label">開催回数</div></div>
          <div class="stat-card"><div class="stat-number">${totalNominees}</div><div class="stat-label">総ノミネート</div></div>
          <div class="stat-card"><div class="stat-number">${uniqueAuthors}</div><div class="stat-label">ノミネート著者数</div></div>
          <div class="stat-card"><div class="stat-number">${multiNom}</div><div class="stat-label">複数回ノミネート</div></div>
        </div>

        <div class="stats-section">
          <div class="stats-section-title">ノミネート回数 TOP 8</div>
          ${topAuthors.map(([name, v]) => `
            <div class="stats-bar-row">
              <div class="stats-bar-label">${name}</div>
              <div class="stats-bar-track"><div class="stats-bar-fill" style="width:${Math.round(v.count / topMax * 100)}%"></div></div>
              <div class="stats-bar-val">${v.count}回</div>
            </div>`).join('')}
        </div>

        <div class="stats-section">
          <div class="stats-section-title">大賞受賞者</div>
          ${topWinners.map(([name, v]) => `
            <div class="stats-bar-row">
              <div class="stats-bar-label">${name}</div>
              <div class="stats-bar-track"><div class="stats-bar-fill" style="width:${Math.round(v.wins / 2 * 100)}%"></div></div>
              <div class="stats-bar-val">${v.wins === 1 ? '1回' : v.wins + '回 👑'}</div>
            </div>`).join('')}
        </div>

        <div class="stats-section">
          <div class="stats-section-title">年代別データ</div>
          <div class="stats-era-grid">
            ${Object.entries(eraData).map(([era, d]) => `
              <div class="stats-era-card">
                <div class="stats-era-label">${era}</div>
                <div class="stats-era-val">
                  ${d.years}<br>
                  ノミネート ${d.count}作品<br>
                  著者 ${d.authors.size}名
                </div>
              </div>`).join('')}
          </div>
        </div>
      `;
    }

    document.addEventListener('DOMContentLoaded', () => {
      renderCards();
      searchIndex = buildSearchIndex();
      document.getElementById('search-input').addEventListener('input', handleSearch);
    });
  </script>
</body>
</html>
